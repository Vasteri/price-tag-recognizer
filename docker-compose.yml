version: "3.8"
  
services:
  nginx:
    image: nginx:1.29.5
    ports: ["80:80"]
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/static:/usr/share/nginx/html
    depends_on:
      - backend
      - flower
      - grafana
    restart: always

  redis:
    image: redis:alpine3.23
    restart: unless-stopped

  backend:
    build: ./backend/
    volumes:
      - shared_volume:/shared
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  worker:
    build: 
      context: ./recognizer
      dockerfile: Dockerfile
    volumes:
      - shared_volume:/shared
    environment:
      - REDIS_URL=redis://redis:6379/0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - redis
      - llama-cpp-server

  llama-cpp-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda13-b9821@sha256:649b128c557eb6d675afac69bac443ce1b709cd143e85ef10b67f1639de4cbb0
    # ports:
    #   - "8000:8000"
    volumes:
      - ./models:/models 
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      -m /models/Qwen3-VL-2B-Instruct-Q4_K_M.gguf
      --jinja
      -c 65535
      --port 8000
      --host 0.0.0.0
      --n-gpu-layers 99
      --metrics

  flower:
    image: mher/flower:2.0.1
    command: celery --broker=redis://redis:6379/0 flower --port=5555 --url_prefix=/flower
    volumes:
      - flower_data:/data
    depends_on:
      - redis
  
  prometheus:
    image: prom/prometheus:v2.50.1
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
        - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - flower
      - backend

  promtail:
    image: grafana/promtail:3.6.11
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Доступ к демону Docker
      - ./infra/promtail-config.yaml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  loki:
    image: grafana/loki:3.7.2 # port 3100
    command: -config.file=/etc/loki/local-config.yaml
    volumes: 
      - loki_data:/loki
  
  grafana:
    image: grafana/grafana:10.4.0
    environment:
      - GF_SERVER_ROOT_URL=/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    
volumes:
  shared_volume:
  flower_data:
  prometheus_data:
  loki_data:
  grafana_data:
