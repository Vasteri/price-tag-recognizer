version: "3.8"

models:
  qwen3-vl:
    model: "ai/qwen3-vl:2B-UD-Q4_K_XL"
  
services:
  nginx:
    image: nginx:1.29.5
    ports: ["80:80"]
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/static:/usr/share/nginx/html
    depends_on:
      - backend

  redis:
    image: redis:alpine3.23
    restart: unless-stopped

  backend:
    build: ./backend/
    volumes:
      - shared_volume:/shared
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  worker:
    build: ./recognizer
    extra_hosts:
      - "model-runner.docker.internal:host-gateway"
    volumes:
      - shared_volume:/shared
    environment:
      - REDIS_URL=redis://redis:6379/0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - redis

  flower:
    image: mher/flower:2.0.1
    command: celery --broker=redis://redis:6379/0 flower --port=5555 --url_prefix=/flower
    depends_on:
      - redis

volumes:
  shared_volume:
